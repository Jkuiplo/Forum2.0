<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Регистрация</title>
	<link rel="stylesheet" href="/public/log_reg_style.css">
</head>
<body>

	<form id="register-form" class="container">
		<div class="card">
		  <h2>Создайте аккаунт</h2>
		  <p id="alert"></p>
	    
		  <input type="text" name="username" placeholder="Ник">
		  <input type="email" name="email" placeholder="Почта">
		  <input type="password" name="password" placeholder="Пароль">
		  <input type="password" name="confirm" placeholder="Подтвердите пароль">
		  
		  <button type="submit">Зарегистрироваться</button>
		  
		  <p class="login-link">Уже есть аккаунт? <a href="/public/login.html">Войти</a></p>
		</div>
	</form>
	<script src="/src/register.js" type="module"></script>
</body>
</html>
